name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code quality checks
  check:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Check with all features
      run: cargo clippy --all-features --all-targets -- -D warnings

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit

  # Test
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Build
      run: cargo build --verbose

    - name: Test
      run: cargo test --verbose

    - name: Test with all features
      run: cargo test --all-features --verbose

  # Windows build
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: cargo build --release --all-features

    - name: Verify binary
      run: |
        if (Test-Path target\release\news-mcp.exe) {
          Write-Host "Binary compiled successfully for Windows"
        } else {
          Write-Error "Binary not found for Windows"
          exit 1
        }

  # Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-docs-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Build documentation
      run: cargo doc --no-deps --all-features

  # Docker build test
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: docker build -f Dockerfile.scratch -t news-mcp:test .

    - name: Test Docker image
      run: |
        docker run -d --name test-container -p 8080:8080 news-mcp:test
        trap 'docker logs test-container || true; docker stop test-container || true; docker rm test-container || true' EXIT

        sleep 5

        curl -fsSI http://127.0.0.1:8080/health || true
        docker logs test-container

  # Publish check
  publish-check:
    name: Publish Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-publish-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Check publish (dry-run)
      run: cargo publish --dry-run

  # Publish to crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, security, test, build-windows, docs]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-publish-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Verify version matches tag
      run: |
        CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/')
        TAG_VERSION=${GITHUB_REF#refs/tags/v}

        echo "Cargo.toml version: $CARGO_VERSION"
        echo "Tag version: $TAG_VERSION"

        if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
          echo "Error: Version mismatch!"
          exit 1
        fi

    - name: Publish to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: cargo publish

  # Release binaries
  release:
    name: Build and Release Binaries
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, security, test, build-windows, docs]

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Install cross
      if: matrix.cross
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Install musl tools (Linux musl)
      if: endsWith(matrix.target, '-musl')
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Build binary (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build binary (cross)
      if: matrix.cross
      run: cross build --release --target ${{ matrix.target }}

    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Prepare binary (Unix)
      if: runner.os != 'Windows'
      run: |
        BINARY_NAME="news-mcp-v${{ steps.version.outputs.version }}-${{ matrix.target }}"
        mv target/${{ matrix.target }}/release/news-mcp "$BINARY_NAME"
        chmod +x "$BINARY_NAME"

    - name: Prepare binary (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        BINARY_NAME="news-mcp-v${{ steps.version.outputs.version }}-${{ matrix.target }}.exe"
        mv target/${{ matrix.target }}/release/news-mcp.exe "$BINARY_NAME"

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: news-mcp-v${{ steps.version.outputs.version }}-${{ matrix.target }}*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Docker 二进制预编译 - 只在推送版本标签时运行
  build-docker-binaries:
    name: Build Docker Binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, docker]

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
            use_cross: false
          - target: aarch64-unknown-linux-musl
            arch: arm64
            use_cross: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-docker-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Install musl tools
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Install cross
      if: matrix.use_cross
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Build binary (native)
      if: ${{ !matrix.use_cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build binary (cross)
      if: matrix.use_cross
      run: cross build --release --target ${{ matrix.target }}

    - name: Prepare binary
      run: |
        BINARY_NAME="news-mcp-${{ matrix.arch }}"
        cp target/${{ matrix.target }}/release/news-mcp "$BINARY_NAME"
        chmod +x "$BINARY_NAME"
        echo "binary_name=$BINARY_NAME" >> $GITHUB_OUTPUT
      id: prepare

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.arch }}
        path: ${{ steps.prepare.outputs.binary_name }}
        retention-days: 1

  # Docker 镜像发布 - 只在推送版本标签时运行
  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-docker-binaries]

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Tag version: $VERSION"

    - name: Download amd64 binary
      uses: actions/download-artifact@v4
      with:
        name: binary-amd64
        path: ./binaries/amd64

    - name: Download arm64 binary
      uses: actions/download-artifact@v4
      with:
        name: binary-arm64
        path: ./binaries/arm64

    - name: Verify and prepare binaries
      run: |
        # Create binaries directory
        mkdir -p ./binaries

        echo "Downloaded artifacts structure:"
        find . -name "news-mcp-*" -type f -ls 2>/dev/null || true

        # Find and move binaries to expected locations for Docker
        # The artifact download puts files in subdirectories, find them
        AMD64_BINARY=$(find . -name "news-mcp-amd64" -type f 2>/dev/null | head -1)
        ARM64_BINARY=$(find . -name "news-mcp-arm64" -type f 2>/dev/null | head -1)

        if [ -z "$AMD64_BINARY" ]; then
          echo "ERROR: amd64 binary not found in artifacts"
          exit 1
        fi

        if [ -z "$ARM64_BINARY" ]; then
          echo "ERROR: arm64 binary not found in artifacts"
          exit 1
        fi

        cp "$AMD64_BINARY" ./binaries/news-mcp-amd64
        cp "$ARM64_BINARY" ./binaries/news-mcp-arm64

        echo "Final binaries:"
        ls -la ./binaries/

        # Verify files exist and are executable
        chmod +x ./binaries/news-mcp-amd64 ./binaries/news-mcp-arm64
        file ./binaries/news-mcp-*

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.release
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/news-mcp:latest
          ${{ secrets.DOCKER_USERNAME }}/news-mcp:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max